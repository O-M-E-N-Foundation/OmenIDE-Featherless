name: Omen address review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  check_run:
    types: [completed]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number
        required: true
        type: string
      review_round:
        description: Review round number
        required: false
        default: '0'
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: write

jobs:
  address:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Do NOT cancel in-progress: CodeRabbit comment bursts must coalesce, not kill a running agent.
    concurrency:
      group: omen-address-${{ inputs.pr_number || github.event.pull_request.number || github.event.issue.number || github.event.check_run.pull_requests[0].number || github.run_id }}
      cancel-in-progress: false
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.user.login, 'coderabbit')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.user.login, 'coderabbit')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.user.login, 'coderabbit')) ||
      (github.event_name == 'check_run' &&
       github.event.check_run.name == 'omen-typecheck' &&
       github.event.check_run.conclusion == 'failure' &&
       github.event.check_run.pull_requests[0] != null)
    steps:
      - name: Resolve PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber = null;
            if (context.eventName === 'workflow_dispatch') {
              prNumber = context.payload.inputs.pr_number;
            } else if (context.eventName === 'pull_request_review_comment' || context.eventName === 'pull_request_review') {
              prNumber = context.payload.pull_request.number;
            } else if (context.eventName === 'issue_comment' && context.payload.issue.pull_request) {
              prNumber = context.payload.issue.number;
            } else if (context.eventName === 'check_run') {
              prNumber = context.payload.check_run.pull_requests?.[0]?.number ?? null;
            }
            core.setOutput('number', prNumber ? String(prNumber) : '');
            // 0 = let the agent read omen-round-N from PR labels
            core.setOutput('round', context.payload.inputs?.review_round || '0');

      - name: Debounce CodeRabbit comment bursts
        if: >
          steps.pr.outputs.number != '' &&
          (github.event_name == 'issue_comment' ||
           github.event_name == 'pull_request_review_comment' ||
           github.event_name == 'pull_request_review')
        run: |
          echo "Waiting 90s so concurrent CodeRabbit comments coalesce into one address-review run..."
          sleep 90

      - name: Resolve PR head
        id: head
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.OMEN_AGENT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          REF=$(gh api "repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.number }}" --jq .head.ref)
          SHA=$(gh api "repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.number }}" --jq .head.sha)
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "PR head: $REF @ $SHA"

      - name: Checkout PR branch
        if: steps.pr.outputs.number != ''
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.OMEN_AGENT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ steps.head.outputs.ref }}

      - name: Checkout (schedule sweep)
        if: steps.pr.outputs.number == '' && github.event_name == 'schedule'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.OMEN_AGENT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      # Critical: PR branches lag main. Run the harness from main in a temp dir so
      # check-token / thread-gate fixes apply without committing agent code into the PR.
      - name: Stage omen-agent from main
        if: steps.pr.outputs.number != '' || github.event_name == 'schedule'
        id: agent
        shell: bash
        run: |
          git fetch origin main
          AGENT_DIR="${RUNNER_TEMP}/omen-agent"
          rm -rf "$AGENT_DIR"
          mkdir -p "$AGENT_DIR"
          git archive origin/main .github/omen-agent | tar -x -C "$AGENT_DIR"
          echo "dir=${AGENT_DIR}/.github/omen-agent" >> "$GITHUB_OUTPUT"
          echo "omen-agent staged from main @ $(git rev-parse origin/main)"

      - name: Setup Node
        if: steps.pr.outputs.number != '' || github.event_name == 'schedule'
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install native build deps
        if: steps.pr.outputs.number != '' || github.event_name == 'schedule'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libx11-dev libxkbfile-dev libkrb5-dev

      - name: Compute node modules cache key
        if: steps.pr.outputs.number != '' || github.event_name == 'schedule'
        id: nodeModulesCacheKey
        run: echo "value=$(node build/azure-pipelines/common/computeNodeModulesCacheKey.ts)" >> "$GITHUB_OUTPUT"

      - name: Cache node modules
        if: steps.pr.outputs.number != '' || github.event_name == 'schedule'
        id: cacheNodeModules
        uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-omen-address-nm-${{ steps.nodeModulesCacheKey.outputs.value }}
          restore-keys: ${{ runner.os }}-omen-address-nm-

      - name: Install dependencies
        if: (steps.pr.outputs.number != '' || github.event_name == 'schedule') && steps.cacheNodeModules.outputs.cache-hit != 'true'
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
        run: npm ci

      - name: Configure git
        if: steps.pr.outputs.number != '' || github.event_name == 'schedule'
        run: |
          git config user.name "Omen Agent"
          git config user.email "omen-agent[bot]@users.noreply.github.com"

      - name: Address CodeRabbit feedback
        if: steps.pr.outputs.number != ''
        working-directory: ${{ steps.agent.outputs.dir }}
        env:
          FEATHERLESS_API_KEY: ${{ secrets.FEATHERLESS_API_KEY }}
          OMEN_AGENT_GITHUB_TOKEN: ${{ secrets.OMEN_AGENT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          OMEN_CHECKS_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.OMEN_AGENT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          OMEN_PR_NUMBER: ${{ steps.pr.outputs.number }}
          OMEN_REVIEW_ROUND: ${{ steps.pr.outputs.round }}
          OMEN_AGENT_MODEL: ${{ vars.OMEN_AGENT_MODEL }}
          OMEN_MAX_REVIEW_ROUNDS: ${{ vars.OMEN_MAX_REVIEW_ROUNDS }}
        run: node --experimental-strip-types src/index.ts address-review

      - name: Sweep open AI PRs
        if: github.event_name == 'schedule'
        env:
          FEATHERLESS_API_KEY: ${{ secrets.FEATHERLESS_API_KEY }}
          OMEN_AGENT_GITHUB_TOKEN: ${{ secrets.OMEN_AGENT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          OMEN_CHECKS_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.OMEN_AGENT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OMEN_AGENT_MODEL: ${{ vars.OMEN_AGENT_MODEL }}
          OMEN_MAX_REVIEW_ROUNDS: ${{ vars.OMEN_MAX_REVIEW_ROUNDS }}
          AGENT_DIR: ${{ steps.agent.outputs.dir }}
        shell: bash
        run: |
          set -euo pipefail
          FAILED=0
          # git must run in GITHUB_WORKSPACE (the repo checkout), not the agent archive dir.
          cd "${GITHUB_WORKSPACE}"
          mapfile -t PRS < <(gh api "repos/${GITHUB_REPOSITORY}/pulls?state=open&per_page=30" --jq '.[] | select(any(.labels[]; .name=="ai-authored")) | .number')
          for n in "${PRS[@]:-}"; do
            [ -z "$n" ] && continue
            echo "Addressing PR #$n"
            REF=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/$n" --jq .head.ref)
            git fetch origin "$REF"
            git checkout -B "$REF" "origin/$REF"
            # Round comes from omen-round-N labels inside the agent (OMEN_REVIEW_ROUND=0).
            (cd "$AGENT_DIR" && OMEN_PR_NUMBER="$n" OMEN_REVIEW_ROUND=0 GITHUB_WORKSPACE="$GITHUB_WORKSPACE" node --experimental-strip-types src/index.ts address-review)
            status=$?
            if [ "$status" -ne 0 ]; then
              echo "address-review failed for PR #$n (exit $status)"
              FAILED=1
            fi
          done
          if [ "${FAILED:-0}" -ne 0 ]; then
            echo "One or more address-review sweeps failed"
            exit 1
          fi
