name: Omen auto-merge

on:
  check_suite:
    types: [completed]
  check_run:
    types: [completed]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: Optional PR number (default: all open ai-authored)
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: read

concurrency:
  group: omen-auto-merge
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout agent
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Auto-merge eligible AI PRs
        working-directory: .github/omen-agent
        env:
          FEATHERLESS_API_KEY: ${{ secrets.FEATHERLESS_API_KEY }}
          OMEN_AGENT_GITHUB_TOKEN: ${{ secrets.OMEN_AGENT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          OMEN_CHECKS_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.OMEN_AGENT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OMEN_PR_NUMBER: ${{ github.event.inputs.pr_number || '' }}
        run: node --experimental-strip-types src/index.ts auto-merge
