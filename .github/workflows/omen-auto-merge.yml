name: Omen auto-merge

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Optional PR number (default: all open ai-authored)'
        required: false
        type: string
  # Re-check when required CI completes or CodeRabbit submits a review.
  check_run:
    types: [completed]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: write

concurrency:
  group: omen-auto-merge
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Skip noisy check_run events that are not our merge gates.
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.user.login, 'coderabbit')) ||
      (github.event_name == 'check_run' && (
        contains(fromJSON('["CodeQL","secret-scan","pr-hygiene","omen-typecheck","omen-review-clean","CodeRabbit"]'), github.event.check_run.name) ||
        startsWith(github.event.check_run.name, 'CodeQL')
      ))
    steps:
      - name: Checkout agent
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve target PR (optional)
        id: target
        shell: bash
        run: |
          if [ -n "${{ inputs.pr_number }}" ]; then
            echo "pr=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            echo "pr=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "check_run" ] && [ -n "${{ github.event.check_run.pull_requests[0].number }}" ]; then
            echo "pr=${{ github.event.check_run.pull_requests[0].number }}" >> "$GITHUB_OUTPUT"
          else
            echo "pr=" >> "$GITHUB_OUTPUT"
          fi

      - name: Promote omen-review-clean when CodeRabbit approved
        if: steps.target.outputs.pr != ''
        working-directory: .github/omen-agent
        env:
          FEATHERLESS_API_KEY: ${{ secrets.FEATHERLESS_API_KEY }}
          OMEN_AGENT_GITHUB_TOKEN: ${{ secrets.OMEN_AGENT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          OMEN_CHECKS_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.OMEN_AGENT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OMEN_PR_NUMBER: ${{ steps.target.outputs.pr }}
        run: node --experimental-strip-types src/index.ts merge-ready

      - name: Auto-merge eligible AI PRs
        working-directory: .github/omen-agent
        env:
          FEATHERLESS_API_KEY: ${{ secrets.FEATHERLESS_API_KEY }}
          OMEN_AGENT_GITHUB_TOKEN: ${{ secrets.OMEN_AGENT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          OMEN_CHECKS_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.OMEN_AGENT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OMEN_PR_NUMBER: ${{ steps.target.outputs.pr }}
        run: node --experimental-strip-types src/index.ts auto-merge
