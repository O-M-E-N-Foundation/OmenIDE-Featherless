version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "devcontainers" # https://containers.dev/guide/dependabot
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      # Native/electron stacks are upgraded deliberately with VS Code upstream.
      - dependency-name: "electron"
      - dependency-name: "@vscode/deviceid"
      - dependency-name: "@vscode/sqlite3"
  - package-ecosystem: "npm"
    directory: "/.github/omen-agent"
    schedule:
      interval: "weekly"
